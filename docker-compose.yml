services:
  db:
    image: mysql:8.0
    container_name: sentiment-api-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: sentiment-api-db
      MYSQL_USER: sentiment-api-user
      MYSQL_PASSWORD: sentiment-api-pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: sentiment-api
    restart: unless-stopped
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: sentiment-api-user
      DB_PASSWORD: sentiment-api-pass
      DB_NAME: sentiment-api-db
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./reports:/app/reports

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: sentiment-scheduler
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: sentiment-api-user
      DB_PASSWORD: sentiment-api-pass
      DB_NAME: sentiment-api-db
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./reports:/app/reports

volumes:
  db_data: